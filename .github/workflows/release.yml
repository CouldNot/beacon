name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Beacon.app
    # macos-26 (Tahoe) ships the macOS 26 SDK. Linking against it is what
    # enables the modern Liquid Glass / Tahoe look — an app built against the
    # macOS 15 SDK renders in legacy style even when run on macOS 26+.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode (macOS 26 SDK)
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain
        run: |
          swift --version
          xcrun --show-sdk-version

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Fetch core binaries
        run: |
          Scripts/fetch-xray.sh
          Scripts/fetch-singbox.sh
          Scripts/fetch-tun2socks.sh

      - name: Build & test
        run: |
          swift build -c release
          swift test

      - name: Package Beacon.app
        run: Scripts/package-app.sh "${{ steps.version.outputs.version }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Beacon ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/Beacon.app.zip
